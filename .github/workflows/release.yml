name: Release Build

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          if ! sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            pkg-config \
            libgpiod-dev \
            libgpiodcxx-dev \
            zip; then
            sudo apt-get install -y \
              cmake \
              ninja-build \
              g++ \
              pkg-config \
              libgpiod-dev \
              zip
          fi

      - name: Configure and build
        run: ./scripts/build_core.sh build

      - name: Package release
        run: ./scripts/package_release.sh build solar-stewart-tracker-release.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-stewart-tracker-release
          path: solar-stewart-tracker-release.zip
