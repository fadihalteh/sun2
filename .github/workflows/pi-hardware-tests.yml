name: Raspberry Pi Hardware Smoke Tests

on:
  workflow_dispatch:

jobs:
  hw-tests:
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          if ! sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            pkg-config \
            libgpiod-dev \
            libgpiodcxx-dev; then
            sudo apt-get install -y \
              cmake \
              ninja-build \
              g++ \
              pkg-config \
              libgpiod-dev
          fi

      - name: Configure and build (Pi)
        run: ./scripts/build_pi_debug.sh build-pi

      - name: Run hardware smoke tests
        run: ./scripts/test_pi_hw.sh build-pi

      - name: Upload hardware test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raspberry-pi-hardware-test-log
          path: build-pi/Testing
          if-no-files-found: warn
